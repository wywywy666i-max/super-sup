<!DOCTYPE html>  
<html lang="th">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>ArtTrader Pro</title>  

<script src="https://cdn.tailwindcss.com"></script>  
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>  

</head>  
<body class="bg-gray-900 text-white">  

<div class="max-w-md mx-auto p-3">  

<!-- LOGIN -->  
<div id="login">  
<h1 class="text-2xl mb-3">ArtTrader</h1>  
<input id="user" class="w-full p-2 mb-2 text-black" placeholder="Username">  
<input id="pass" type="password" class="w-full p-2 mb-2 text-black" placeholder="Password">  
<button onclick="login()" class="w-full bg-yellow-500 p-2">Login</button>  
</div>  

<!-- MAIN -->  
<div id="app" class="hidden">  

<!-- NAV -->  
<div class="flex justify-between mb-2">  
<div>ArtTrader</div>  
<div id="status">Offline</div>  
</div>  

<!-- CHART -->  
<div id="chart" class="h-64"></div>  
<div class="text-sm">⏱ <span id="timer">60</span>s</div>  

<!-- SETUP -->  
<div class="mt-3">  
<h2>เลือก 2 Setup</h2>  
<label><input type="checkbox" value="Scalping"> Scalping</label><br>  
<label><input type="checkbox" value="Sniper"> Sniper</label><br>  
<label><input type="checkbox" value="Cleopatra"> คลีโอ</label><br>  
<label><input type="checkbox" value="All-in"> All-in</label>  
</div>  

<!-- CALC -->  
<div class="mt-3">  
<button onclick="calc()" class="bg-green-500 p-2 w-full">คำนวณ</button>  
<div id="result" class="text-sm mt-2"></div>  
</div>  

<!-- RANK -->  
<div class="mt-3">  
<h2>Top 3</h2>  
<ul id="rank"></ul>  
</div>  

<!-- SOCIAL -->  
<div class="mt-3">  
<input id="postInput" class="w-full p-2 text-black" placeholder="โพสต์...">  
<button onclick="post()" class="bg-blue-500 p-2 w-full mt-1">Post</button>  
<div id="feed"></div>  
</div>  

<!-- CHAT -->  
<div class="mt-3">  
<div id="chat" class="h-24 overflow-auto bg-gray-800 p-2"></div>  
<input id="chatInput" class="w-full p-2 text-black">  
<button onclick="sendChat()" class="bg-purple-500 w-full p-2 mt-1">Send</button>  
</div>  

</div>  
</div>  

<script>  

let price = 100  
let data = [price]  
let time = 60  

function login(){  
document.getElementById("login").style.display="none"  
document.getElementById("app").style.display="block"  
document.getElementById("status").innerText="Online"  
startChart()  
startTimer()  
}  

function startChart(){  
setInterval(()=>{  
price += (Math.random()-0.5)*2  
data.push(price)  

Plotly.newPlot('chart', [{  
y:data,  
type:'scatter'  
}], {margin:{t:0}})  
},1000)  
}  

function startTimer(){  
setInterval(()=>{  
time--  
if(time<=0) time=60  
document.getElementById("timer").innerText=time  
},1000)  
}  

function calc(){  
let tp = (price+2).toFixed(2)  
let sl = (price-2).toFixed(2)  
let lot = (Math.random()*0.1).toFixed(2)  

document.getElementById("result").innerText =  
"TP: "+tp+" SL: "+sl+" Lot: "+lot  

// ranking  
let r = document.getElementById("rank")  
r.innerHTML = ""  
for(let i=1;i<=3;i++){  
let li=document.createElement("li")  
li.innerText = "อันดับ "+i+" : "+(price+i).toFixed(2)  
r.appendChild(li)  
}  
}
